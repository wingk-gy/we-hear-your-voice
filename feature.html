<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名通報表單 | SafeSchool</title>
    <style>
        :root {
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-primary: #2C3E4F;
            --text-secondary: #546E7A;
            --accent-color: #34495E;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(44, 62, 79, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 導航欄 */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .back-link {
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* 表單區域 */
        .form-section {
            padding: 120px 0 60px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        .form-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-group label .required {
            color: #E74C3C;
            margin-left: 0.25rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E8ECF0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: #FAFBFC;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(44, 62, 79, 0.1);
            background: #fff;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .form-group .hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* 檔案上傳 */
        .file-upload {
            border: 2px dashed #D1D9E0;
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #FAFBFC;
        }

        .file-upload:hover {
            border-color: var(--text-primary);
            background: #f5f7fa;
        }

        .file-upload.dragover {
            border-color: var(--text-primary);
            background: rgba(44, 62, 79, 0.05);
        }

        .file-upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .file-upload p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .file-upload input {
            display: none;
        }

        .file-list {
            margin-top: 1rem;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f5f7fa;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .file-item .remove-file {
            color: #E74C3C;
            cursor: pointer;
            font-weight: 600;
        }

        /* 提交按鈕 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--text-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 62, 79, 0.25);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* 隱私提示 */
        .privacy-notice {
            text-align: center;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(39, 174, 96, 0.08);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .privacy-notice strong {
            color: #27AE60;
        }

        /* RWD */
        @media (max-width: 768px) {
            .form-section {
                padding: 100px 0 40px;
            }
            .form-card {
                padding: 1.5rem;
            }
            .form-header h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- 導航欄 -->
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="back-link">
                    <span>←</span>
                    <span>返回首頁</span>
                </a>
                <div class="logo">🛡️ SafeSchool</div>
            </nav>
        </div>
    </header>

    <!-- 表單區域 -->
    <section class="form-section">
        <div class="container">
            <div class="form-header">
                <h1>匿名通報表單</h1>
                <p>請填寫您遭遇的霸凌情況，我們會保護您的隱私</p>
            </div>

            <form class="form-card" id="reportForm">
                <div class="form-group">
                    <label>發生時間 <span class="required">*</span></label>
                    <input type="datetime-local" id="time" required>
                </div>

                <div class="form-group">
                    <label>發生地點 <span class="required">*</span></label>
                    <input type="text" id="location" placeholder="例如：三年二班教室、操場角落..." required>
                </div>

                <div class="form-group">
                    <label>霸凌類型</label>
                    <select id="type">
                        <option value="">請選擇類型</option>
                        <option value="verbal">言語霸凌</option>
                        <option value="physical">肢體霸凌</option>
                        <option value="relational">關係霸凌</option>
                        <option value="cyber">網路霸凌</option>
                        <option value="sexual">性霸凌</option>
                        <option value="other">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>詳細描述 <span class="required">*</span></label>
                    <textarea id="description" placeholder="請詳細描述發生的事情，包括人物、經過等..." required></textarea>
                    <p class="hint">描述越詳細，我們越能幫助您</p>
                </div>

                <div class="form-group">
                    <label>上傳證據（選填）</label>
                    <div class="file-upload" id="fileUpload">
                        <div class="file-upload-icon">📎</div>
                        <p>點擊或拖曳檔案至此處</p>
                        <p style="font-size: 0.85rem; margin-top: 0.3rem;">支援圖片、影片、文件（最大 10MB）</p>
                        <input type="file" id="fileInput" multiple accept="image/*,video/*,.pdf,.doc,.docx">
                    </div>
                    <div class="file-list" id="fileList"></div>
                </div>

                <button type="submit" class="submit-btn">送出通報</button>

                <div class="privacy-notice">
                    <strong>🔒 您的隱私受到保護</strong><br>
                    所有資訊將完全匿名處理，我們不會收集任何個人身份資料。
                </div>
            </form>
        </div>
    </section>

    <script>
        // 檔案上傳處理
        const fileUpload = document.getElementById('fileUpload');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        let uploadedFiles = [];

        fileUpload.addEventListener('click', () => fileInput.click());

        fileUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUpload.classList.add('dragover');
        });

        fileUpload.addEventListener('dragleave', () => {
            fileUpload.classList.remove('dragover');
        });

        fileUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUpload.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.size <= 10 * 1024 * 1024) {
                    uploadedFiles.push(file);
                    renderFileList();
                } else {
                    alert('檔案大小不能超過 10MB');
                }
            });
        }

        function renderFileList() {
            fileList.innerHTML = uploadedFiles.map((file, index) => `
                <div class="file-item">
                    <span>📄 ${file.name}</span>
                    <span class="remove-file" onclick="removeFile(${index})">移除</span>
                </div>
            `).join('');
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            renderFileList();
        }

        // 表單提交
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 跳轉回首頁並顯示感謝訊息
            window.location.href = 'index.html?submitted=true';
        });
    </script>
</body>
</html>
